<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mi Agenda">
<title>Mi Agenda Personal</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --primary:#2563eb;
  --soft:#e0ecff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(160deg,#eef4ff,#f9fafb);
  color:var(--text);
}
.app{
  max-width:760px;
  margin:auto;
  padding:22px 16px 90px;
}
.header{
  background:linear-gradient(135deg,#111827,#2563eb);
  color:white;
  padding:24px;
  border-radius:28px;
  box-shadow:0 18px 40px rgba(0,0,0,.18);
}
.header h1{margin:0;font-size:28px}
.header p{margin:8px 0 0;color:#dbeafe}
.card{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-top:16px;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
}
label{
  font-weight:700;
  display:block;
  margin-bottom:8px;
}
input,textarea,select{
  width:100%;
  border:1px solid #d1d5db;
  border-radius:16px;
  padding:13px;
  font-size:16px;
  background:#fff;
}
textarea{
  height:95px;
  resize:vertical;
}
.category-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.badge{
  background:var(--soft);
  color:var(--primary);
  padding:5px 10px;
  border-radius:999px;
  font-size:13px;
}
.actions{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:12px 16px 22px;
  background:rgba(245,247,251,.9);
  backdrop-filter:blur(12px);
}
.actions-inner{
  max-width:760px;
  margin:auto;
  display:flex;
  gap:10px;
}
button{
  border:0;
  border-radius:16px;
  padding:14px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
}
.primary{
  flex:1;
  background:var(--primary);
  color:white;
}
.secondary{
  background:#e5e7eb;
  color:#111827;
}
.progress{
  height:12px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}
.progress div{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#2563eb,#22c55e);
}
.small{
  color:var(--muted);
  font-size:14px;
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <h1>Mi Agenda Personal</h1>
    <p>Organiza tu día, hábitos, trabajo, ejercicio y desarrollo espiritual.</p>
  </div>

  <div class="card">
    <label>Selecciona el día</label>
    <input id="date" type="date">
  </div>

  <div class="card">
    <div class="category-title">
      <strong>Progreso del día</strong>
      <span id="percent" class="badge">0%</span>
    </div>
    <br>
    <div class="progress"><div id="bar"></div></div>
    <p class="small">Marca las áreas que completaste hoy.</p>
  </div>

  <div id="sections"></div>

</div>

<div class="actions">
  <div class="actions-inner">
    <button class="secondary" onclick="clearDay()">Limpiar</button>
    <button class="primary" onclick="saveDay()">Guardar día</button>
  </div>
</div>

<script>
const categories = [
  { id:'habitos', title:'Hábitos personales', placeholder:'Ej: Tomé agua, leí, ordené mi cuarto...' },
  { id:'espiritual', title:'Desarrollo espiritual', placeholder:'Ej: Oración, lectura bíblica, reflexión...' },
  { id:'trabajo', title:'Trabajo / negocios', placeholder:'Ej: Tareas completadas, llamadas, clientes...' },
  { id:'ejercicio', title:'Ejercicio / salud', placeholder:'Ej: Corrí, gym, comidas, descanso...' },
  { id:'personal', title:'Vida personal', placeholder:'Ej: Familia, emociones, decisiones importantes...' },
  { id:'entretenimiento', title:'Entretenimiento', placeholder:'Ej: Película, música, hobby, descanso...' },
  { id:'aprendizaje', title:'Aprendizaje', placeholder:'Ej: Curso, libro, tema nuevo, práctica...' }
];

const dateInput = document.getElementById('date');
const sections = document.getElementById('sections');
const bar = document.getElementById('bar');
const percent = document.getElementById('percent');

function today(){
  return new Date().toISOString().slice(0,10);
}

function storageKey(){
  return 'agenda_' + dateInput.value;
}

function render(){
  dateInput.value = dateInput.value || today();
  const saved = JSON.parse(localStorage.getItem(storageKey()) || '{}');

  sections.innerHTML = categories.map(cat => `
    <div class="card">
      <div class="category-title">
        <label>${cat.title}</label>
        <input 
          type="checkbox" 
          id="check_${cat.id}" 
          ${saved[cat.id]?.done ? 'checked' : ''} 
          onchange="updateProgress()"
          style="width:auto"
        >
      </div>
      <textarea 
        id="text_${cat.id}" 
        placeholder="${cat.placeholder}"
      >${saved[cat.id]?.text || ''}</textarea>
    </div>
  `).join('');

  updateProgress();
}

function saveDay(){
  const data = {};
  categories.forEach(cat => {
    data[cat.id] = {
      done: document.getElementById('check_' + cat.id).checked,
      text: document.getElementById('text_' + cat.id).value.trim()
    };
  });

  localStorage.setItem(storageKey(), JSON.stringify(data));
  alert('Día guardado correctamente.');
  updateProgress();
}

function updateProgress(){
  let done = 0;
  categories.forEach(cat => {
    const check = document.getElementById('check_' + cat.id);
    if(check && check.checked) done++;
  });

  const value = Math.round((done / categories.length) * 100);
  bar.style.width = value + '%';
  percent.textContent = value + '%';
}

function clearDay(){
  if(confirm('¿Quieres borrar la información de este día?')){
    localStorage.removeItem(storageKey());
    render();
  }
}

dateInput.addEventListener('change', render);
render();
</script>
</body>
</html>
